<svg xmlns="http://www.w3.org/2000/svg" width="720" height="64" viewBox="0 0 720 64" role="img" aria-label="Statusline preview: Opus 4.8, xhigh effort, thinking on, project my-project on branch main, context 42 percent">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4c546b"/>
      <stop offset="0.18" stop-color="#3a4057"/>
      <stop offset="0.5" stop-color="#2d3243"/>
      <stop offset="0.82" stop-color="#3a4057"/>
      <stop offset="1" stop-color="#4c546b"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- terminal background -->
  <rect x="0" y="0" width="720" height="64" rx="10" fill="#0d0d10"/>

  <!-- liquid glass pill: rounded caps via large rx, glass gradient body -->
  <rect x="14" y="14" width="692" height="36" rx="18" fill="url(#glass)"/>
  <rect x="14" y="14" width="692" height="36" rx="18" fill="url(#rim)"/>
  <rect x="14.5" y="14.5" width="691" height="35" rx="17.5" fill="none" stroke="#6a7290" stroke-opacity="0.35" stroke-width="1"/>

  <g font-family="ui-monospace, Menlo, monospace" font-size="15" dominant-baseline="middle">
    <!-- model name (accent blue, bold) -->
    <text x="40" y="33" fill="#0a84ff" font-weight="700">Opus 4.8</text>

    <!-- effort (purple, bold) -->
    <text x="124" y="33" fill="#a78bfa" font-weight="700">xhigh</text>

    <!-- thinking lamp (gold) approximated as a small star/asterisk glyph -->
    <g transform="translate(178,26)">
      <circle cx="6" cy="6" r="6.5" fill="#ffc83c" fill-opacity="0.16"/>
      <path d="M6 1.2 L7.35 4.65 L11 4.95 L8.2 7.35 L9.1 11 L6 9 L2.9 11 L3.8 7.35 L1 4.95 L4.65 4.65 Z" fill="#ffc83c"/>
    </g>

    <!-- folder icon + project name -->
    <g transform="translate(232,21)">
      <path d="M0 2.5 a1.4 1.4 0 0 1 1.4 -1.4 h3.4 l1.4 1.6 h6.6 a1.4 1.4 0 0 1 1.4 1.4 v6.2 a1.4 1.4 0 0 1 -1.4 1.4 h-12 a1.4 1.4 0 0 1 -1.4 -1.4 Z" fill="none" stroke="#a2a2aa" stroke-width="1.4" stroke-linejoin="round"/>
    </g>
    <text x="258" y="33" fill="#f2f2f5">my-project</text>

    <!-- git icon (diamond) + branch -->
    <g transform="translate(360,26)">
      <path d="M6 0 L12 6 L6 12 L0 6 Z" fill="none" stroke="#a2a2aa" stroke-width="1.4" stroke-linejoin="round"/>
      <circle cx="6" cy="6" r="1.7" fill="#a2a2aa"/>
    </g>
    <text x="382" y="33" fill="#f2f2f5">main</text>

    <!-- context icon (small gauge) -->
    <g transform="translate(440,26)">
      <circle cx="6" cy="6" r="6" fill="none" stroke="#a2a2aa" stroke-width="1.4"/>
      <path d="M6 6 L9.2 4" fill="none" stroke="#a2a2aa" stroke-width="1.4" stroke-linecap="round"/>
    </g>

    <!-- context slider: thin rail with filled portion + knob (green state, 42%) -->
    <g>
      <line x1="464" y1="32" x2="608" y2="32" stroke="#686870" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="464" y1="32" x2="524" y2="32" stroke="#30d758" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="524" cy="32" r="5" fill="#30d758"/>
      <circle cx="524" cy="32" r="5" fill="#ffffff" fill-opacity="0.12"/>
    </g>

    <!-- percentage (state color, bold) -->
    <text x="620" y="33" fill="#30d758" font-weight="700">42%</text>
  </g>
</svg>

